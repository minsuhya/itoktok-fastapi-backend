---
services:
  # nginx
  nginx:
    container_name: std-nginx
    image: nginx:alpine
    restart: unless-stopped
    #외부와 소통하는 경우에는 ports로 포트 설정.
    ports:
      - "8081:80"
      #  - "443:443"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/dist:/var/www/html
    environment:
      - TZ=Asia/Seoul
    depends_on:
      - api
    networks:
      - std-net
    logging:
      options:
        max-size: "20m"
        max-file: "1"

  api:
    image: std-api
    container_name: std-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    # command: poetry run python app/main.py
    command: poetry run uvicorn app.main:app --host 0.0.0.0 --port 3000 --reload
    ports:
      - 3000:3000
    env_file: ./.env
    volumes:
      - ./backend/app:/backend/app
      - ./data:/data
    networks:
      - std-net
    logging:
      options:
        max-size: "20m"
        max-file: "1"

#  frontend:
#    build:
#      context: ./frontend
#    container_name: react-web-dev
#    volumes:
#      - ./frontend:/app # 로컬 코드 마운트
#      - /app/node_modules # 컨테이너 내부 라이브러리 보호
#    ports:
#      - "5173:5173"
#    environment:
#      - WATCHPACK_POLLING=true # 파일 변경 감지 보장 (일부 OS 필수)
#    restart: always
#
mobile:
  build:
    context: ./mobile
  container_name: expo-mobile-dev
  volumes:
    - ./mobile:/app # 로컬 코드 마운트
    - /app/node_modules # 컨테이너 내부 라이브러리 보호
  ports:
    - "8082:8081"
  environment:
    # 서버의 실제 공인 IP를 입력하세요 (예: 123.123.123.123)
    # 외부 작업자가 다른 네트워크에 있다면 아래 옵션을 tunnel로 변경 권장
    # - EXPO_PUBLIC_PACKAGER_PROXY_URL=exp://[공인IP]:8081
    # 또는 최신 버전에서 권장되는 방식
    - REACT_NATIVE_PACKAGER_HOSTNAME=3.35.51.192
  stdin_open: true # 대화형 모드 활성화 (QR 코드 가시성)
  tty: true # 컬러 로그 출력
  restart: always

networks:
  std-net:
    driver: bridge
